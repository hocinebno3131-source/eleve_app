<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نموذج تسجيل الطلبة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body { 
    font-family: 'Cairo', sans-serif; 
    background: #e3f2fd; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0; 
    padding: 20px; 
}
.container { 
    max-width: 500px; 
    width: 100%;
    background: #1976d2; 
    padding: 30px; 
    border-radius: 12px; 
    box-shadow: 0 8px 20px rgba(0,0,0,0.2); 
    color: white;
}
h2 { text-align: center; margin-bottom: 25px; }

input, select { 
    width: 100%; 
    padding: 10px; 
    margin: 8px 0; 
    border-radius: 6px; 
    border: 1px solid #90caf9; 
    font-size: 16px; 
    background: #f9f9f9; 
    color: #000;
}

.buttons { 
    display: flex; 
    gap: 15px; 
    margin-top: 15px; 
}

.buttons button { 
    flex: 1; 
    padding: 12px; 
    border: none; 
    border-radius: 6px; 
    font-size: 18px; 
    cursor: pointer; 
    font-weight: bold; 
}

#submitBtn { background: #4caf50; color: white; }
#cancelBtn { background: #bdbdbd; color: #212121; }

#arabicModal {
    display: none;
    position: fixed;
    top: 0; left: 0; right:0; bottom:0;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
}

#arabicModal .modal-content {
    background: #ffeb3b;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
    <h2>نموذج تسجيل الطلبة</h2>

    <!-- لا يوجد method ولا action -->
    <form id="studentForm">
        <input type="text" name="last_name" placeholder="اللقب" required>
        <input type="text" name="first_name" placeholder="الاسم الشخصي" required>

        <select name="class" required>
            <option value="">اختر القسم</option>
            <option value="أولى علوم1">أولى علوم1</option>
            <option value="أولى علوم2">أولى علوم2</option>
        </select>

        <select name="group" required>
            <option value="">اختر الفوج</option>
            <option value="الفوج1">الفوج1</option>
            <option value="الفوج2">الفوج2</option>
        </select>

        <input type="text" name="phone" placeholder="رقم الهاتف" required>
        <input type="text" name="note" placeholder="ملاحظة">

        <div class="buttons">
            <button type="submit" id="submitBtn">إرسال</button>
            <button type="button" id="cancelBtn" onclick="location.reload()">إلغاء</button>
        </div>
    </form>
</div>

<div id="arabicModal">
    <div class="modal-content">
        الرجاء كتابة المعلومات بالعربية فقط ❌
        <br><br>
        <button onclick="closeArabicModal()">إغلاق</button>
    </div>
</div>

<script>
function isArabic(text) {
    return /^[\u0600-\u06FF\s]+$/.test(text);
}

let students = JSON.parse(localStorage.getItem("students")) || [];

document.getElementById("studentForm").addEventListener("submit", function(e){
    e.preventDefault(); // منع إعادة تحميل الصفحة

    const lastName = this.last_name.value.trim();
    const firstName = this.first_name.value.trim();
    const classValue = this.class.value;
    const group = this.group.value;
    const phone = this.phone.value.trim();
    const note = this.note.value.trim();

    if(!isArabic(lastName) || !isArabic(firstName) || (note && !isArabic(note))) {
        document.getElementById("arabicModal").style.display = "flex";
        return;
    }

    const newStudent = {
        id: Date.now(),
        last_name: lastName,
        first_name: firstName,
        class: classValue,
        group: group,
        phone: phone,
        note: note
    };

    students.push(newStudent);
    localStorage.setItem("students", JSON.stringify(students));

    window.location.href = "success.html";
});

function closeArabicModal() {
    document.getElementById("arabicModal").style.display = "none";
}
</script>

</body>
</html>
